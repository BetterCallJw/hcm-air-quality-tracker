name: Daily Air Quality Tracker

on:
  schedule:
    # Chạy vào 01:00 sáng giờ UTC mỗi ngày (tương đương 08:00 sáng giờ Việt Nam)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-and-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Script
        run: python main.py

      - name: Commit and Push Excel File
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add hcm_air_quality_log.xlsx
          
          # Lệnh này kiểm tra xem file Excel có thay đổi không, nếu có thì mới commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Bổ sung dữ liệu không khí ngày hôm qua" && git push)
